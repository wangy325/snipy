# 自定义clash规则
port: 7890
socks-port: 7891
redir-port: 7892
mixed-port: 7893
allow-lan: false
mode: rule
log-level: warn
external-controller: '127.0.0.1:9090'

## 代理集，用来管理、不同的机场
# 可用的测速地址:
# http://www.gstatic.com/generate_204
# http://www.google-analytics.com/generate_204
# http://www.google.com/generate_204
# http://connectivitycheck.gstatic.com/generate_204
# http://cp.cloudflare.com/
# http://www.v2ex.com/generate_204
# http://www.apple.com/library/test/success.html
# http://www.msftconnecttest.com/connecttest.txt
proxy-providers:
  Ikuuu:
    type: http
    path: ./proxyset/ikuuu-sub.yaml
    url: ""
    interval: 1800
    health-check:
      enable: true
      url: http://www.gstatic.com/generate_204
      interval: 300
  
proxy-groups:
  - name: 🎯境外流量
    type: select  
    url: http://www.gstatic.com/generate_204
    interval: 300
    proxies:
      - DIRECT
      - 🇨🇳自由亚洲
      - 🇭🇰你知唔知
      - ⬇️下载专用
      - ♻️故障切换

  - name: 🇨🇳自由亚洲
    type: select
    url: http://www.gstatic.com/generate_204
    interval: 300
    use: 
      - Ikuuu
    filter: "日本A|台湾|新加坡|韩国"

  - name: 🇭🇰你知唔知
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    use:
      - Ikuuu
    filter: "香港"

  - name: ⬇️下载专用
    type: select
    url: http://www.gstatic.com/generate_204
    interval: 300
    use:
      - Ikuuu
    filter: "下载专用"

  - name: ♻️故障切换
    type: select
    url: http://www.gstatic.com/generate_204
    interval: 300
    use:
      - Ikuuu
    filter: "US|DE|KR|AR|UK|AT|美国|加拿大|印度|法国|德国|土耳其|英国|俄罗斯|乌克兰|阿根廷|澳大利亚"
    proxies:
      - 🆓️免费备用
  - name: 🆓️免费备用
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    use:
      - Ikuuu
    filter: "免费"

  - name: 🤖OpenAI
    type: select
    proxies:
      - 🎯境外流量
      - 🇨🇳自由亚洲
      - ♻️故障切换
  - name: 🎵Spotify
    type: select
    use:
      - Ikuuu
    filter: "台湾|TW"
    proxies:
      - DIRECT
      - 🎯境外流量
  - name: 🔍Google
    type: select
    use:
      - Ikuuu
    filter: "美国|新加坡|台湾"
    proxies:
      - 🎯境外流量
      
  - name: 🕊Gemini
    type: select
    use:
      - Ikuuu
    filter: "美国|加拿大"
    proxies:
      - 🎯境外流量
      - 🇨🇳自由亚洲

  - name: 🎬Youtube
    type: select
    proxies: 
      - 🎯境外流量
  - name: 📺Netflix
    type: select
    proxies: 
      - 🎯境外流量
      - 🇭🇰你知唔知
      - 🇺🇸为人民服务

  - name: 🍎Apple
    type: select
    proxies: 
      - DIRECT
      - 🎯境外流量
  - name: ⚠️广告拦截
    type: select
    proxies:
      - REJECT
      - ♻️故障切换
      - DIRECT
  - name: 🐟漏网之鱼
    type: select
    proxies:
      - DIRECT
      - REJECT
      - 🎯境外流量

